<style>
    .brush .selection {
        fill: #2a78d6;
        fill-opacity: 0.08;
        stroke: #2a78d6;
        stroke-opacity: 0.4;
    }

    #subCategorySelect {
        height: 32px;
    }

    #scatter_plot circle {
        transition: r 100ms ease;
    }

    #scatter_plot circle.selected {
        stroke: #0b0b0b;
        stroke-width: 2px;
    }

    #scatterplot-layout {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: flex-start;
    }

    #selected-info-panel {
        min-width: 220px;
        flex: 1 1 260px;
    }

    #selected-info-panel h3 {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
    }

    .data-table tr.row-alt {
        background: rgba(11, 11, 11, 0.03);
    }

    .data-table td.cell-profit.positive {
        color: #006300;
        font-weight: 600;
    }

    .data-table td.cell-profit.negative {
        color: #d03b3b;
        font-weight: 600;
    }

    .category-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
    }

    #table-pagination {
        display: none;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        font-size: 12px;
        color: var(--text-secondary);
    }

    #table-pagination .btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
    }

    #data-table-wrap {
        max-height: 320px;
        overflow-y: auto;
    }
</style>

<div class="card-toolbar">
    <h2 style="margin: 0;">銷售額 vs 利潤率</h2>
    <div id="selected-info"></div>
</div>

<div class="viz-legend" id="scatter_legend"></div>

<div id="scatterplot-layout">
    <svg id="scatter_plot" width="620" height="420"></svg>
    <div id="selected-info-panel">
        <div id="data-table-wrap">
            <table id="data-table" class="data-table">
                <thead>
                    <tr>
                        <th>Sales</th>
                        <th>Profit %</th>
                        <th>Category</th>
                        <th>Sub Category</th>
                        <th>Product Name</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="table-pagination"></div>
    </div>
</div>
<div id="scatter_tooltip" class="viz-tooltip"></div>

<script src="{{ url_for('static', filename='js/scatterplot.js') }}"></script>
<script>
    let originalData = []; // 全域儲存原始資料

    async function renderScatterplot() {
        fetch('/api/products_and_order_details')
            .then(response => response.json())
            .then(data => {
                originalData = data.data;  // 儲存原始資料
                drawScatterplot(originalData);  // 初次畫圖
                createSubCategorySelect(data.sub_category);
            })
            .catch(error => {
                console.error('資料載入失敗:', error);
            });
    }
    renderScatterplot();
</script>
